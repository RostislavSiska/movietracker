<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Tracker</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome (иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Наши стили -->
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🎬 Movie Tracker</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- Форма поиска -->
            <form class="d-flex ms-auto" id="search-form">
                <input class="form-control me-2" type="search" placeholder="Поиск фильмов" aria-label="Search" id="search-input">
                <button class="btn btn-outline-light" type="submit">Поиск</button>
            </form>
            <ul class="navbar-nav ms-2" id="nav-links">
                <!-- сюда будут динамические ссылки -->
            </ul>
        </div>
    </div>
</nav>

    <!-- Основной контейнер для контента -->
    <main class="container my-4" id="app">
        <!-- Сюда будет загружаться содержимое страниц -->
        <div class="text-center">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Загрузка...</span>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS (для меню и модалок) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Наши скрипты -->
    <script type="module" src="static/js/api.js"></script>
    <script type="module" src="static/js/components/movieCard.js"></script>
    <script type="module" src="static/js/pages/home.js"></script>
    <script type="module" src="static/js/pages/profilePage.js"></script>
    <script type="module" src="static/js/main.js"></script>
</body>
</html>
